<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">
    <div class="login-card">

        <h2>🌿 Plant Leaf Disease Analyzer</h2>
        <p>Login to continue</p>



        <input type="text" id="username" placeholder="Username" autocomplete="new-username">
        <input type="password" id="password" placeholder="Password" autocomplete="new-password">

        <button onclick="login()">🔐 Sign In</button>
        <p align="center">Don't have an account? <span style="color:blue;cursor:pointer;" onclick="goToSignup()">Sign up</span></p>
        <script>
            function goToSignup(){
               window.location.href="signup.html";
            }
        </script>


    </div>
</div>

<script src="script.js"></script>

<script>
    function goToSignup() {
        window.location.href = "signup.html";
    }

    window.onload = function() {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";

        if(localStorage.getItem("loggedIn")){
            window.location.href="upload.html";
        }
    }
</script>

</body>
</html>
